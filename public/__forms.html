<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Form Detection</title>
  </head>
  <body>
    <form name="booking" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="booking" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" type="email" />
      <input name="phone" />
      <input name="pickupLocation" />
      <input name="destination" />
      <input name="pickupDate" />
      <input name="pickupTime" />
      <input name="dropoffDate" />
      <input name="dropoffTime" />
      <input name="passengers" />
      <input name="serviceType" />
    </form>
  </body>
</html>
