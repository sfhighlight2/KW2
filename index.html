<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingsway Transportation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>

<body>
  <div id="root"></div>

  <!-- Hidden static form so Netlify's build-time crawler can detect the "booking" form. -->
  <!-- The real form is rendered client-side by React and never appears in the static HTML. -->
  <form name="booking" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="booking" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="pickupLocation" />
    <input name="destination" />
    <input name="pickupDate" />
    <input name="pickupTime" />
    <input name="dropoffDate" />
    <input name="dropoffTime" />
    <input name="passengers" />
    <input name="serviceType" />
  </form>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
